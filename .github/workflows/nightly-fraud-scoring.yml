# Nightly batch scoring: fraud on orders + late-delivery → order_predictions
# Requires repo secret: DATABASE_URL (Supabase Postgres URI)
# Requires committed ml/models/*.joblib and inference JSON configs

name: Nightly fraud scoring

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Score orders (fraud)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/src/score_orders.py

      - name: Score late delivery → order_predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/src/score_late_delivery_predictions.py
