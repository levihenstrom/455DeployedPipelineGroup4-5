# Nightly batch fraud scoring → updates orders.fraud_probability / fraud_predicted / fraud_scored_at
# Requires repo secret: DATABASE_URL (Supabase Postgres URI)
# Requires committed ml/models/fraud_model.joblib, fraud_preprocessor.joblib, fraud_inference_config.json
# (run extract_and_clean.py + train_models.py locally or in CI, then commit artifacts)

name: Nightly fraud scoring

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Score orders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/src/score_orders.py
